<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-label="rise - a small Ada-first privilege launcher">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#063b3f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="260" rx="28" fill="url(#bg)"/>
  <circle cx="780" cy="60" r="90" fill="#2dd4bf" opacity="0.15" filter="url(#soft)"/>
  <circle cx="170" cy="230" r="120" fill="#7dd3fc" opacity="0.10" filter="url(#soft)"/>

  <g transform="translate(76,54)">
    <rect x="0" y="0" width="118" height="118" rx="26" fill="#101827" stroke="#2dd4bf" stroke-opacity="0.5"/>
    <path d="M59 24 L91 86 H74 L67 71 H49 L42 86 H25 L59 24Z" fill="url(#accent)"/>
    <path d="M54 58 H62 L58 48 Z" fill="#101827"/>
    <path d="M34 100 H84" stroke="#7dd3fc" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  </g>

  <text x="225" y="104" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="68" font-weight="800" fill="#f8fafc" letter-spacing="-2">rise</text>
  <text x="228" y="143" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#a7f3d0">Ada-first privilege escalation for Linux</text>
  <text x="228" y="181" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#cbd5e1">structured policy · PAM auth · timestamp tickets · clean exec path</text>

  <g transform="translate(228,205)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">
