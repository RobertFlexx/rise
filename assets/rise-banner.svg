    <rect x="108" y="0" width="88" height="28" rx="14" fill="#172033"/>
    <text x="152" y="18.5" text-anchor="middle" fill="#e5e7eb">PAM</text>
    <rect x="208" y="0" width="128" height="28" rx="14" fill="#172033"/>
